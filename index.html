<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsere Momente</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      color: #111;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    .gallery {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .lightbox.active {
      display: flex;
    }

    .close {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 28px;
      color: white;
      cursor: pointer;
      font-weight: 300;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
    }

    /* Upload Button */
    #uploadBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 14px;
      background: #111;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<input type="file" id="uploadInput" accept="image/*" style="display:none">
<button id="uploadBtn">Upload</button>

<header>
  <div class="profile">
    <img src="IMG_0531.JPG">
    <div class="profile-name">¥EN¥EN & L€O</div>
    <div class="subtitle">YY & LL</div>
  </div>
</header>

<div class="gallery" id="gallery">
  <img src="IMG_0556.JPG">
  <img src="IMG_0557.JPG">
</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
</div>

<footer>
  our gallery
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, listAll }
    from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSdoSNAKCSHCau795FmQl3vyVpV-TVjhk",
    authDomain: "yyll-65961.firebaseapp.com",
    projectId: "yyll-65961",
    storageBucket: "yyll-65961.appspot.com",
    messagingSenderId: "372429848516",
    appId: "1:372429848516:web:38ab854517e152c0bdae91",
    measurementId: "G-CBHF9WQVE3"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const storage = getStorage(app);

  const uploadBtn = document.getElementById("uploadBtn");
  const uploadInput = document.getElementById("uploadInput");
  const gallery = document.getElementById("gallery");

  uploadBtn.onclick = () => uploadInput.click();

  uploadInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const storageRef = ref(storage, 'images/' + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);

    const url = await getDownloadURL(storageRef);
    addImage(url);
  };

  function addImage(url) {
    const img = document.createElement("img");
    img.src = url;

    img.addEventListener('click', () => {
      lightbox.classList.add('active');
      lightboxImg.src = url;
    });

    gallery.appendChild(img);
  }

  async function loadImages() {
    const listRef = ref(storage, 'images/');
    const res = await listAll(listRef);

    res.items.forEach(async (itemRef) => {
      const url = await getDownloadURL(itemRef);
      addImage(url);
    });
  }

  loadImages();

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function closeLightbox() {
    lightbox.classList.remove('active');
  }

  window.closeLightbox = closeLightbox;

  uploadInput.onchange = async (e) => {
  try {
    const file = e.target.files[0];
    if (!file) return;

    console.log("Uploading file...");

    const storageRef = ref(storage, 'images/' + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);

    console.log("Upload success!");

    const url = await getDownloadURL(storageRef);
    addImage(url);

  } catch (error) {
    console.error("ERROR:", error);
    alert(error.message);
  }
};
</script>

</body>
</html>
